<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17421133724"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','AW-17421133724');</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Login — Great Mar-cy's & Sons Limited</title>
  <link rel="icon" href="{{ url_for('static', filename='image/logogmc.png') }}" type="image/png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --amber:#D4961A;--amber2:#F0B429;--amber3:#FCD77F;
      --dark:#080808;--dark2:#111111;--dark3:#1A1A1A;
      --white:#FFFFFF;
      --ff-display:'Playfair Display',Georgia,serif;
      --ff-body:'Outfit',system-ui,sans-serif;
      --ease:cubic-bezier(0.16,1,0.3,1);
    }

    html,body{height:100%}
    body{
      font-family:var(--ff-body);
      background:var(--dark);
      color:var(--white);
      display:flex;align-items:center;justify-content:center;
      min-height:100dvh;
      overflow:hidden;
      cursor:none;
    }

    /* ── BACKGROUND ── */
    .bg-layer{
      position:fixed;inset:0;z-index:0;
      background:radial-gradient(ellipse at 20% 50%, rgba(212,150,26,.07) 0%, transparent 60%),
                 radial-gradient(ellipse at 80% 20%, rgba(212,150,26,.05) 0%, transparent 50%),
                 var(--dark);
    }
    /* animated grid */
    .bg-grid{
      position:fixed;inset:0;z-index:0;
      background-image:linear-gradient(rgba(212,150,26,.03) 1px,transparent 1px),
                       linear-gradient(90deg,rgba(212,150,26,.03) 1px,transparent 1px);
      background-size:60px 60px;
      animation:gridDrift 25s linear infinite;
    }
    @keyframes gridDrift{from{background-position:0 0}to{background-position:60px 60px}}

    /* noise */
    .bg-noise{
      position:fixed;inset:0;z-index:0;opacity:.035;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:200px;
    }

    /* floating orbs */
    .orb{
      position:fixed;border-radius:50%;filter:blur(80px);
      pointer-events:none;z-index:0;opacity:.12;
      animation:orbFloat 8s ease-in-out infinite alternate;
    }
    .orb1{width:400px;height:400px;background:var(--amber);top:-100px;left:-100px;animation-delay:0s}
    .orb2{width:300px;height:300px;background:var(--amber2);bottom:-80px;right:-80px;animation-delay:-4s}
    @keyframes orbFloat{from{transform:translate(0,0) scale(1)}to{transform:translate(30px,20px) scale(1.1)}}

    /* Custom cursor */
    .cursor{position:fixed;width:10px;height:10px;background:var(--amber2);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .2s,height .2s}
    .cursor-ring{position:fixed;width:36px;height:36px;border:1.5px solid rgba(212,150,26,.45);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:all .12s ease}
    .cursor.grow{width:18px;height:18px}
    .cursor-ring.grow{width:56px;height:56px;border-color:var(--amber)}

    /* ── LOGIN CARD ── */
    .login-wrap{
      position:relative;z-index:10;
      width:100%;max-width:460px;
      padding:2rem;
      animation:cardIn .9s var(--ease) both;
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:none}}

    .login-card{
      background:rgba(17,17,17,.85);
      border:1px solid rgba(212,150,26,.12);
      backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px);
      padding:3.5rem 3rem;
      position:relative;overflow:hidden;
    }

    /* top gold line */
    .login-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,transparent,var(--amber),var(--amber2),transparent);
    }

    /* corner deco */
    .corner-deco{
      position:absolute;bottom:-1px;right:-1px;
      width:60px;height:60px;
      border-left:1px solid rgba(212,150,26,.15);
      border-top:1px solid rgba(212,150,26,.15);
      transform:rotate(180deg);
    }

    /* brand */
    .login-brand{text-align:center;margin-bottom:2.5rem}
    .login-logo{height:48px;width:auto;object-fit:contain;margin:0 auto 1.25rem;filter:brightness(.95)}
    .login-brand h1{
      font-family:var(--ff-display);
      font-size:1.7rem;font-weight:700;
      color:var(--white);line-height:1;margin-bottom:.4rem;
    }
    .login-brand h1 em{color:var(--amber2);font-style:italic}
    .login-brand p{
      font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;
      color:rgba(255,255,255,.3);
    }

    /* divider */
    .divider{
      display:flex;align-items:center;gap:1rem;
      margin-bottom:2rem;
    }
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
    .divider span{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.25)}

    /* flash */
    .flash-box{
      background:rgba(239,68,68,.08);
      border:1px solid rgba(239,68,68,.25);
      border-left:3px solid #ef4444;
      padding:.9rem 1.1rem;margin-bottom:1.75rem;
      font-size:.85rem;color:#fca5a5;
      animation:fadeUp .4s var(--ease);
    }
    .flash-box p{display:flex;align-items:center;gap:8px}
    .flash-box p::before{content:'\f071';font-family:'Font Awesome 6 Free';font-weight:900;font-size:.75rem;color:#ef4444}
    @keyframes fadeUp{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

    /* form */
    .login-form{display:flex;flex-direction:column;gap:1.1rem}

    .fgroup{display:flex;flex-direction:column;gap:.4rem}
    .fgroup label{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.3);font-weight:500}

    .input-wrap{position:relative}
    .input-wrap i{
      position:absolute;left:1.1rem;top:50%;transform:translateY(-50%);
      color:rgba(212,150,26,.4);font-size:.85rem;
      transition:color .3s;pointer-events:none;
    }
    .fgroup:focus-within .input-wrap i{color:var(--amber2)}

    .fgroup input{
      width:100%;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.07);
      padding:.95rem 1.1rem .95rem 2.8rem;
      color:var(--white);
      font-family:var(--ff-body);font-size:.9rem;
      outline:none;transition:border-color .3s,background .3s;
    }
    .fgroup input:focus{
      border-color:rgba(212,150,26,.45);
      background:rgba(212,150,26,.03);
    }
    .fgroup input::placeholder{color:rgba(255,255,255,.2)}

    /* password toggle */
    .pw-toggle{
      position:absolute;right:1.1rem;top:50%;transform:translateY(-50%);
      color:rgba(255,255,255,.2);cursor:pointer;font-size:.85rem;
      transition:color .3s;background:none;border:none;
    }
    .pw-toggle:hover{color:var(--amber2)}

    /* submit */
    .submit-btn{
      width:100%;padding:1.05rem;
      background:var(--amber);color:var(--dark);
      border:none;font-family:var(--ff-body);font-weight:700;
      font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;
      cursor:pointer;position:relative;overflow:hidden;
      transition:all .4s var(--ease);margin-top:.4rem;
      display:flex;align-items:center;justify-content:center;gap:10px;
    }
    .submit-btn::before{
      content:'';position:absolute;inset:0;
      background:var(--amber2);transform:translateX(-101%);
      transition:.4s var(--ease);
    }
    .submit-btn:hover::before{transform:translateX(0)}
    .submit-btn span,.submit-btn i{position:relative;z-index:1}
    .submit-btn:active{transform:scale(.98)}

    /* back link */
    .back-link{
      display:flex;align-items:center;justify-content:center;gap:6px;
      margin-top:1.75rem;
      font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;
      color:rgba(255,255,255,.2);transition:color .3s;
    }
    .back-link:hover{color:var(--amber2)}
    .back-link i{font-size:.65rem}

    /* secure badge */
    .secure-badge{
      display:flex;align-items:center;justify-content:center;gap:6px;
      margin-top:2rem;
      font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;
      color:rgba(255,255,255,.15);
    }
    .secure-badge i{color:rgba(212,150,26,.3);font-size:.7rem}

    /* responsive */
    @media(max-width:480px){
      .login-card{padding:2.5rem 1.75rem}
      .login-wrap{padding:1rem}
    }
  </style>
</head>
<body>

<!-- Background layers -->
<div class="bg-layer"></div>
<div class="bg-grid" aria-hidden="true"></div>
<div class="bg-noise" aria-hidden="true"></div>
<div class="orb orb1" aria-hidden="true"></div>
<div class="orb orb2" aria-hidden="true"></div>

<!-- Custom cursor -->
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- LOGIN CARD -->
<div class="login-wrap">
  <div class="login-card">
    <div class="corner-deco" aria-hidden="true"></div>

    <!-- Brand -->
    <div class="login-brand">
      <img src="{{ url_for('static', filename='image/logogmc.png') }}" alt="Great Marcy Realty" class="login-logo">
      <h1>Great <em>Marcy</em></h1>
      <p>Admin Portal · Secure Access</p>
    </div>

    <div class="divider"><span>Sign In</span></div>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-box">
          {% for message in messages %}
            <p>{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <!-- Login Form -->
    <form class="login-form" method="POST" action="{{ url_for('admin_login') }}" autocomplete="off">
      <div class="fgroup">
        <label for="username">Username</label>
        <div class="input-wrap">
          <i class="fas fa-user" aria-hidden="true"></i>
          <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
        </div>
      </div>

      <div class="fgroup">
        <label for="password">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock" aria-hidden="true"></i>
          <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility">
            <i class="fas fa-eye" id="pwIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="submit-btn">
        <span>Sign In</span>
        <i class="fas fa-arrow-right"></i>
      </button>
    </form>

    <a href="{{ url_for('home') }}" class="back-link">
      <i class="fas fa-arrow-left"></i> Back to Website
    </a>

    <div class="secure-badge" aria-hidden="true">
      <i class="fas fa-shield-alt"></i>
      Secured &amp; Encrypted Connection
    </div>
  </div>
</div>

<script>
  // Cursor
  const cursor=document.getElementById('cursor');
  const ring=document.getElementById('cursorRing');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px'});
  (function animRing(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animRing)})();
  document.querySelectorAll('a,button,input').forEach(el=>{
    el.addEventListener('mouseenter',()=>{cursor.classList.add('grow');ring.classList.add('grow')});
    el.addEventListener('mouseleave',()=>{cursor.classList.remove('grow');ring.classList.remove('grow')});
  });

  // Password toggle
  document.getElementById('pwToggle').addEventListener('click',function(){
    const pw=document.getElementById('password');
    const icon=document.getElementById('pwIcon');
    if(pw.type==='password'){
      pw.type='text';
      icon.classList.replace('fa-eye','fa-eye-slash');
    } else {
      pw.type='password';
      icon.classList.replace('fa-eye-slash','fa-eye');
    }
  });
</script>
</body>
</html>
